<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | Reader's Haven</title>

    <!-- Pre-load Theme to prevent Flicker -->
    <script>
        (function() {
            const theme = localStorage.getItem('theme');
            if (theme === 'light') document.documentElement.classList.add('light-mode');
        })();
    </script>
    <meta name="description" content="Create your Reader's Haven account and join millions of manga readers. Start your reading journey today.">

    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Tailwind Configuration -->
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        dark: '#121212',
                        card: '#202020',
                        accent: '#D6336C',
                        muted: '#A0A0A0',
                        darker: '#181818',
                        surface: '#2A2A2A'
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    }
                }
            }
        }
    </script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="./assets/css/signup-page.css">
</head>
<body class=" text-white font-sans antialiased min-h-screen flex items-center justify-center relative overflow-hidden">

    <!-- Back to Home Button -->
    <a href="index.html" class="fixed top-6 left-6 md:top-10 md:left-10 z-50 flex items-center gap-3 text-accent font-bold transition-all duration-300 group">
        <div class="w-10 h-10 md:w-12 md:h-12 rounded-full bg-accent/10 backdrop-blur-md border border-accent/20 flex items-center justify-center group-hover:bg-accent group-hover:text-white transition-all shadow-[0_0_20px_rgba(214,51,108,0.15)]">
            <i class="fa-solid fa-arrow-left"></i>
        </div>
        <span class="hidden sm:block tracking-wide">Back to Home</span>
    </a>

    <!-- Background Ambient Effects -->
    <div class="signup-bg-glow signup-bg-glow--1"></div>
    <div class="signup-bg-glow signup-bg-glow--2"></div>

    <!-- Signup Card -->
    <div class="w-full max-w-md mx-4 relative z-10 py-8">

        <!-- Logo -->
        <a href="index.html" class="flex items-center justify-center gap-3 mb-8 group">
            <span class="font-black text-3xl tracking-wider text-accent">Reader's Haven</span>
        </a>

        <!-- Form Container -->
        <div class="signup-card bg-card/80 backdrop-blur-xl rounded-2xl p-8 shadow-2xl border border-gray-800/40">

            <h1 class="text-2xl font-black text-center mb-1 tracking-tight">Create Account</h1>
            <p class="text-muted text-sm text-center mb-7">Join the community and start reading today</p>

            <form id="signup-form" class="flex flex-col gap-4" novalidate>

                <!-- Username Input -->
                <div class="flex flex-col gap-1.5">
                    <label for="signup-username" class="text-sm font-semibold text-gray-300">Username</label>
                    <div class="relative">
                        <i class="fa-regular fa-user absolute left-4 top-1/2 -translate-y-1/2 text-muted text-sm"></i>
                        <input
                            type="text"
                            id="signup-username"
                            placeholder="Choose a username"
                            required
                            class="w-full bg-[#2A2A2A] border border-gray-700/50 rounded-xl py-3 pl-11 pr-4 text-sm text-white placeholder-gray-500 outline-none transition-all duration-300 focus:border-accent focus:ring-2 focus:ring-accent/20 focus:shadow-[0_0_12px_rgba(214, 51, 108,0.1)]"
                        >
                    </div>
                </div>

                <!-- Email Input -->
                <div class="flex flex-col gap-1.5">
                    <label for="signup-email" class="text-sm font-semibold text-gray-300">Email Address</label>
                    <div class="relative">
                        <i class="fa-regular fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-muted text-sm"></i>
                        <input
                            type="email"
                            id="signup-email"
                            placeholder="you@example.com"
                            required
                            class="w-full bg-[#2A2A2A] border border-gray-700/50 rounded-xl py-3 pl-11 pr-4 text-sm text-white placeholder-gray-500 outline-none transition-all duration-300 focus:border-accent focus:ring-2 focus:ring-accent/20 focus:shadow-[0_0_12px_rgba(214, 51, 108,0.1)]"
                        >
                    </div>
                </div>

                <!-- Phone Number Input -->
                <div class="flex flex-col gap-1.5">
                    <label for="signup-phone" class="text-sm font-semibold text-gray-300">Phone Number</label>
                    <div class="flex gap-2.5">
                        <div class="relative w-[100px] shrink-0">
                            <i class="fa-solid fa-globe absolute left-3 top-1/2 -translate-y-1/2 text-muted text-sm"></i>
                            <input
                                type="text"
                                id="signup-country-code"
                                placeholder="+855"
                                maxlength="4"
                                required
                                class="w-full bg-[#2A2A2A] border border-gray-700/50 rounded-xl py-3 pl-9 pr-2 text-sm text-white placeholder-gray-500 outline-none transition-all duration-300 focus:border-accent focus:ring-2 focus:ring-accent/20 focus:shadow-[0_0_12px_rgba(214, 51, 108,0.1)] text-center"
                            >
                        </div>
                        <div class="relative flex-1">
                            <i class="fa-solid fa-phone absolute left-4 top-1/2 -translate-y-1/2 text-muted text-sm"></i>
                            <input
                                type="tel"
                                id="signup-phone"
                                placeholder="Enter mobile number"
                                required
                                class="w-full bg-[#2A2A2A] border border-gray-700/50 rounded-xl py-3 pl-11 pr-4 text-sm text-white placeholder-gray-500 outline-none transition-all duration-300 focus:border-accent focus:ring-2 focus:ring-accent/20 focus:shadow-[0_0_12px_rgba(214, 51, 108,0.1)]"
                            >
                        </div>
                    </div>
                </div>

                <!-- Password Input -->
                <div class="flex flex-col gap-1.5">
                    <label for="signup-password" class="text-sm font-semibold text-gray-300">Password</label>
                    <div class="relative">
                        <i class="fa-solid fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-muted text-sm"></i>
                        <input
                            type="password"
                            id="signup-password"
                            placeholder="Create a strong password"
                            required
                            minlength="6"
                            class="w-full bg-[#2A2A2A] border border-gray-700/50 rounded-xl py-3 pl-11 pr-12 text-sm text-white placeholder-gray-500 outline-none transition-all duration-300 focus:border-accent focus:ring-2 focus:ring-accent/20 focus:shadow-[0_0_12px_rgba(214, 51, 108,0.1)]"
                        >
                        <button type="button" id="toggle-password" class="absolute right-4 top-1/2 -translate-y-1/2 text-muted hover:text-accent transition-colors" aria-label="Toggle password visibility">
                            <i class="fa-regular fa-eye"></i>
                        </button>
                    </div>
                    <!-- Password Strength Indicator -->
                    <div class="flex gap-1 mt-1" id="password-strength">
                        <div class="h-1 flex-1 rounded-full bg-gray-700 transition-all duration-300" id="str-1"></div>
                        <div class="h-1 flex-1 rounded-full bg-gray-700 transition-all duration-300" id="str-2"></div>
                        <div class="h-1 flex-1 rounded-full bg-gray-700 transition-all duration-300" id="str-3"></div>
                        <div class="h-1 flex-1 rounded-full bg-gray-700 transition-all duration-300" id="str-4"></div>
                    </div>
                </div>

                <!-- Confirm Password -->
                <div class="flex flex-col gap-1.5">
                    <label for="signup-confirm" class="text-sm font-semibold text-gray-300">Confirm Password</label>
                    <div class="relative">
                        <i class="fa-solid fa-shield-halved absolute left-4 top-1/2 -translate-y-1/2 text-muted text-sm"></i>
                        <input
                            type="password"
                            id="signup-confirm"
                            placeholder="Confirm your password"
                            required
                            class="w-full bg-[#2A2A2A] border border-gray-700/50 rounded-xl py-3 pl-11 pr-4 text-sm text-white placeholder-gray-500 outline-none transition-all duration-300 focus:border-accent focus:ring-2 focus:ring-accent/20 focus:shadow-[0_0_12px_rgba(214, 51, 108,0.1)]"
                        >
                    </div>
                </div>

                <!-- Terms -->
                <label class="flex items-start gap-2.5 cursor-pointer group mt-1">
                    <input type="checkbox" id="signup-terms" class="w-4 h-4 rounded bg-surface border-gray-600 text-accent focus:ring-accent/30 cursor-pointer mt-0.5">
                    <span class="text-xs text-muted group-hover:text-white transition-colors leading-relaxed">
                        I agree to the <a href="#" class="text-accent hover:underline">Terms of Service</a> and <a href="#" class="text-accent hover:underline">Privacy Policy</a>
                    </span>
                </label>

                <!-- Submit Button -->
                <button type="submit" id="signup-btn" class="signup-btn w-full bg-accent hover:bg-pink-500 text-dark font-bold py-3 rounded-xl text-sm tracking-wide transition-all duration-300 transform hover:-translate-y-0.5 hover:shadow-[0_8px_24px_rgba(214, 51, 108,0.3)] active:translate-y-0 mt-1">
                    CREATE ACCOUNT
                </button>

                <!-- Divider -->
                <div class="flex items-center gap-4">
                    <div class="flex-grow h-px bg-gray-700/50"></div>
                    <span class="text-xs text-muted font-medium tracking-wider">OR</span>
                    <div class="flex-grow h-px bg-gray-700/50"></div>
                </div>

                <!-- Social Login -->
                <div class="flex gap-3">
                    <button type="button" class="social-btn flex-1 flex items-center justify-center gap-2 bg-surface/60 hover:bg-surface border border-gray-700/40 rounded-xl py-2.5 text-sm font-semibold text-white transition-all duration-300 hover:border-gray-600">
                        <i class="fa-brands fa-google text-red-400"></i> Google
                    </button>
                    <button type="button" class="social-btn flex-1 flex items-center justify-center gap-2 bg-surface/60 hover:bg-surface border border-gray-700/40 rounded-xl py-2.5 text-sm font-semibold text-white transition-all duration-300 hover:border-gray-600">
                        <i class="fa-brands fa-facebook text-blue-400"></i> Facebook
                    </button>
                </div>
            </form>

            <!-- Login Link -->
            <p class="text-center text-sm text-muted mt-6">
                Already have an account?
                <a href="login.html" class="text-accent font-semibold hover:text-white transition-colors">Log In</a>
            </p>
        </div>
    </div>

    <!-- Auth JS -->
    <script src="./assets/js/auth.js"></script>
</body>
</html>
